; ============================================================
;  L!M Vario - CALCULATEUR (ESP32 DevKit V4)
;  Lit les capteurs (BMP388 absolu + MS4525DO differentiel),
;  calcule le vario compense TE + integration, envoie en UART.
;
;  Carte ecran (ESP32-S3) = projet ../Firmware
; ============================================================
[platformio]
; Cache de build HORS Nextcloud (comme le firmware ecran)
build_dir = C:/PioBuild/LM-Calculateur

[env:calculateur]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    adafruit/Adafruit BMP3XX Library@^2.1.5
    madhephaestus/ESP32Encoder@^0.11.7

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -I"C:/Users/loyer/Nextcloud/Data/13-Projet Perso/L!M Vario/Shared"
