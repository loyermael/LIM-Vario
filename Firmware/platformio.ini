; ============================================================
;  L!M Vario - Waveshare ESP32-S3-Touch-LCD-2.1 (N16R8)
;  Ecran rond 480x480 IPS - ST7701S (RGB) - Touch CST820
; ============================================================

[platformio]
; Dossier de build HORS Nextcloud (evite de synchroniser 180+ Mo)
build_dir = C:/PioBuild/LM-Vario

[env:lm-vario]
; pioarduino = fork communautaire fournissant Arduino-ESP32 3.x (esp-idf 5.x)
; necessaire car le demo Waveshare utilise les API 3.x (esp_lcd RGB, ledcAttach...)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; --- Liaison serie / upload ---
monitor_speed = 115200
upload_speed  = 921600

; --- Flash 16 Mo + PSRAM 8 Mo OPI (modele N16R8) ---
board_build.flash_mode          = qio
board_build.flash_size          = 16MB
board_upload.flash_size         = 16MB
board_build.partitions          = default_16MB.csv
board_build.arduino.memory_type = qio_opi

; --- Options de compilation ---
build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -I include
    -I src
    -I src/ui
    -I"C:/Users/loyer/Nextcloud/Data/13-Projet Perso/L!M Vario/Shared"
    ; Code vendeur Waveshare (Wireless.cpp) : warnings non bloquants
    -Wno-error=return-type

; --- Script pre-build : sync auto de l'UI EEZ -> firmware ---
extra_scripts = pre:sync_ui.py

; --- Librairies ---
lib_deps =
    lvgl/lvgl@8.4.0
    madhephaestus/ESP32Encoder@^0.11.7
